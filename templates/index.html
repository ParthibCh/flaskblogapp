{% extends "base.html" %}
{% block content %}

<h1>All Posts</h1>

{% for post in posts %}
    <h3>{{ post.title }}</h3>
    <p>{{ post.content }}</p>

    {% if current_user.is_authenticated and post.user_id == current_user.id %}
        <a href="{{ url_for('edit', id=post.id) }}">Edit</a>
        <a href="{{ url_for('delete', id=post.id) }}">Delete</a>
    {% endif %}

    <hr>
{% endfor %}

{% endblock %}
